name: Release E2E (Playwright)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest JUnit
        id: vitest
        continue-on-error: true
        run: npm run test:junit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: npm run test:e2e

      - name: Generate consolidated executive report
        if: always()
        run: python scripts/generate_executive_report.py

      - name: Upload executive HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executive-test-report
          path: |
            reports/executive_test_report.html
            public/reports/executive_test_report.html
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-xml
          path: reports/playwright-results.xml
          if-no-files-found: ignore

      - name: Upload Vitest JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-xml
          path: reports/vitest-results.xml
          if-no-files-found: ignore

      - name: Commit updated report artifacts
        if: always()
        run: |
          set -euo pipefail
          target_branch="${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ public/reports/
          if git diff --cached --quiet; then
            echo "No report artifact changes to commit."
          else
            git commit -m "chore(ci): refresh release test report artifacts"
            for attempt in 1 2 3; do
              if git push origin "HEAD:${target_branch}"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts."
                exit 1
              fi
              echo "Push rejected (attempt ${attempt}); rebasing onto origin/${target_branch} and retrying."
              git fetch origin "${target_branch}"
              git rebase "origin/${target_branch}"
            done
          fi

      - name: Fail job when tests failed
        if: steps.vitest.outcome == 'failure' || steps.playwright.outcome == 'failure'
        run: |
          echo "Vitest or Playwright suite failed."
          exit 1
