name: Vitest Quality Report

on:
  push:
    branches: [ main, master ]
    paths:
      - "App.tsx"
      - "components/**"
      - "services/**"
      - "src/**"
      - "types.ts"
      - "vitest/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "scripts/generate_executive_report.py"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vitest-report.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest JUnit
        id: vitest
        continue-on-error: true
        run: npm run test:junit

      - name: Generate consolidated executive report
        if: always()
        run: python scripts/generate_executive_report.py

      - name: Upload executive HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executive-test-report
          path: |
            reports/executive_test_report.html
            public/reports/executive_test_report.html
          if-no-files-found: ignore

      - name: Upload Vitest JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-xml
          path: reports/vitest-results.xml
          if-no-files-found: ignore

      - name: Commit updated report artifacts
        if: always()
        run: |
          set -euo pipefail
          target_branch="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/vitest-results.xml reports/executive_test_report.html public/reports/
          if git diff --cached --quiet; then
            echo "No report artifact changes to commit."
          else
            git commit -m "chore(ci): refresh vitest quality report artifacts"
            for attempt in 1 2 3; do
              if git push origin "HEAD:${target_branch}"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts."
                exit 1
              fi
              echo "Push rejected (attempt ${attempt}); rebasing onto origin/${target_branch} and retrying."
              git fetch origin "${target_branch}"
              git rebase "origin/${target_branch}"
            done
          fi

      - name: Fail job when Vitest failed
        if: steps.vitest.outcome == 'failure'
        run: |
          echo "Vitest suite failed."
          exit 1
